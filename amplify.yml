version: 1
applications:
  - appRoot: vehicle-rental-inspection-dispatch
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
    customHeaders:
      - pattern: '**'
        headers:
          - key: X-Frame-Options
            value: SAMEORIGIN
          - key: Strict-Transport-Security
            value: 'max-age=31536000; includeSubDomains'
          - key: X-Content-Type-Options
            value: nosniff
          - key: Referrer-Policy
            value: strict-origin-when-cross-origin
